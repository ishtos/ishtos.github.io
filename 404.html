<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 — Not Found · ishtos</title>
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#131110" />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #131110;
      color: #f0ebe3;
      font-family: "JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo, monospace;
      background-image:
        linear-gradient(to right, rgba(240, 235, 227, 0.022) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(240, 235, 227, 0.022) 1px, transparent 1px);
      background-size: 80px 80px;
    }
    .box { padding: 2rem; max-width: 90%; }
    .code {
      font-size: clamp(3.5rem, 14vw, 7rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
    }
    .msg { color: #948b7d; font-size: 0.95rem; margin: 1.25rem 0 2rem; }
    .msg b { color: #c6a15b; font-weight: 500; }
    a.home {
      display: inline-flex;
      align-items: center;
      gap: 0.5em;
      color: #f0ebe3;
      text-decoration: none;
      font-size: 0.95rem;
      padding-bottom: 3px;
      border-bottom: 1px solid rgba(240, 235, 227, 0.18);
    }
    a.home span { color: #c6a15b; }
    a.home:hover { color: #dcbe82; border-color: #c6a15b; }
  </style>
</head>
<body>
  <main class="box">
    <div class="code">404</div>
    <p class="msg"><b>// page not found</b><br />お探しのページは見つかりませんでした。</p>
    <a class="home" href="/"><span>←</span> back to home</a>
  </main>
</body>
</html>
